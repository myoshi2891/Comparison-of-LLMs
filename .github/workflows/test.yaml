name: test

on:
  push:
  pull_request:

jobs:
  # -------------------------
  # 変更ファイル検出（最重要）
  # -------------------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      scraper: ${{ steps.filter.outputs.scraper }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            scraper:
              - 'scraper/**'
            web:
              - 'web-next/**'

  # -------------------------
  # WEB TEST（変更時のみ）
  # -------------------------
  web-test:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v1

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            web-next/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('web-next/bun.lock') }}

      - name: Install deps
        working-directory: web-next
        run: bun install --frozen-lockfile

      - name: Test web
        working-directory: web-next
        run: bun run test

  # -------------------------
  # SCRAPER TEST（変更時のみ）
  # -------------------------
  scraper-test:
    needs: changes
    if: needs.changes.outputs.scraper == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: 'scraper/uv.lock'

      - name: Install deps
        working-directory: scraper
        run: uv sync --frozen

      - name: Test scraper
        working-directory: scraper
        run: uv run pytest
