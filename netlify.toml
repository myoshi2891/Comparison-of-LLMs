[build]
  # Phase 13: Next.js App Router (web-next/) を静的エクスポートとして配信する。
  # base を web-next に切替え、publish は base 相対で out ディレクトリを指す。
  # feat/nextjs-migration ブランチでのみ有効 (main は Phase 14 まで従来の web/ ビルドを維持)。
  base    = "web-next"
  command = "bun install && bun run build"
  publish = "out"

[build.environment]
  # Netlify でのランタイム指定
  # - BUN_VERSION: web-next の依存解決・ビルドに使用
  # - NODE_VERSION: Next.js 16 は Node 20+ を要求 (Bun は Node ランタイムを代替しない)
  BUN_VERSION  = "1.3.9"
  NODE_VERSION = "20"
