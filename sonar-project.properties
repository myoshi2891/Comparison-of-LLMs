# SonarQube Cloud（旧 SonarCloud）解析設定 — public リポジトリ無料プラン
# scanner はリポジトリルートを base dir として実行する（CI / make sonar）。
#
# ▼ 要置換: 下記 2 値は SonarQube Cloud でプロジェクト import 後に発行される実値に置き換える。
#   organization … 組織キー（例: myoshi2891）
#   projectKey   … プロジェクトキー（例: myoshi2891_Comparison-of-LLMs）
sonar.organization=YOUR_SONAR_ORG
sonar.projectKey=YOUR_SONAR_PROJECT_KEY
sonar.projectName=Comparison-of-LLMs

# ── 解析対象（モノレポ: TypeScript=web-next / Python=scraper）──────────────────
# パスはリポジトリルート相対。
sonar.sources=web-next/app,web-next/components,web-next/lib,scraper/src
sonar.tests=web-next/tests,scraper/tests

# ── カバレッジレポート ──────────────────────────────────────────────────────
# 注: レポート内のファイルパスは make sonar / CI がリポジトリルート相対へ書き換える
#     （lcov の SF: に web-next/ を付与、coverage.xml の <source> を scraper/src/scraper に補正）。
#     これを行わないとパス解決に失敗しカバレッジ 0% になる（モノレポ最頻出の罠）。
sonar.javascript.lcov.reportPaths=web-next/coverage/lcov.info
sonar.python.coverage.reportPaths=scraper/coverage.xml
sonar.python.version=3.12

# ── 除外設定 ───────────────────────────────────────────────────────────────
# 解析対象から除外（ビルド成果物・依存・凍結中の legacy・テストファイル本体）
sonar.exclusions=web-next/.next/**,web-next/out/**,web-next/node_modules/**,scraper/.venv/**,legacy/**,**/*.test.ts,**/*.test.tsx
# カバレッジ計算から除外（テスト・設定ファイル）
sonar.coverage.exclusions=**/*.test.*,web-next/tests/**,scraper/tests/**,**/*.config.*

sonar.sourceEncoding=UTF-8
